appId: com.mcla.launcher
productName: MCLA
directories:
  buildResources: resources
  output: dist
files:
  - out/**/*
  - "!out/renderer/**/*"
extraResources:
  - from: out/renderer
    to: renderer
win:
  target:
    - nsis
  icon: resources/icons/icon.ico
  signAndEditExecutable: false
mac:
  target:
    - dmg
  icon: resources/icons/icon.png
linux:
  target:
    - AppImage
  icon: resources/icons/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
