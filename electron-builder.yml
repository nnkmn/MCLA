appId: com.mcla.launcher
productName: MCLA
copyright: Copyright © 2026 EccenTri

directories:
  buildResources: resources
  output: build

files:
  - out/**/*
  - "!out/renderer/**/*"

extraResources:
  - from: out/renderer
    to: renderer

win:
  target:
    - nsis
  icon: resources/icons/icon.ico
  signAndEditExecutable: false

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: MCLA
  uninstallDisplayName: MCLA
