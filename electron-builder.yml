appId: com.mcla.launcher
productName: MCLA
copyright: Copyright © 2026 EccenTri

directories:
  output: build

files:
  - out/**/*
  - "!out/renderer/**/*"

extraResources:
  - from: out/renderer
    to: renderer
  - from: public
    to: public
  - from: resources/icons
    to: icons

win:
  target:
    - nsis
  icon: resources/icons/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: MCLA
  uninstallDisplayName: MCLA
  installerIcon: resources/icons/icon.ico
  uninstallerIcon: resources/icons/icon.ico

publish:
  provider: github
  owner: nnkmn
  repo: MC-Launcher-Alpha-
  releaseType: release
  updaterCacheDirName: mcla-updater
